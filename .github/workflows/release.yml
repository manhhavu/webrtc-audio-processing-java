name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-natives:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: macos-aarch64
            lib: libapm.dylib
          - os: ubuntu-latest
            target: linux-x86_64
            lib: libapm.so
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install meson ninja

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install rust-objcopy
        run: rustup component add llvm-tools

      - name: Build native library
        working-directory: native
        run: cargo build --release

      - name: Upload native artifact
        uses: actions/upload-artifact@v5
        with:
          name: native-${{ matrix.target }}
          path: native/target/release/${{ matrix.lib }}

  publish-release:
    name: Publish Release
    needs: build-natives
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Extract version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Download macOS native
        uses: actions/download-artifact@v5
        with:
          name: native-macos-aarch64
          path: webrtc-audio-processing-natives/build/natives/macos-aarch64

      - name: Download Linux native
        uses: actions/download-artifact@v5
        with:
          name: native-linux-x86_64
          path: webrtc-audio-processing-natives/build/natives/linux-x86_64

      - name: Build
        run: ./gradlew build -x test -PreleaseVersion=${{ steps.version.outputs.version }}

      - name: Stage artifacts
        run: ./gradlew publishMavenPublicationToStagingRepository -PreleaseVersion=${{ steps.version.outputs.version }}

      - name: Deploy to Maven Central
        env:
          JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_DEPLOY_MAVEN_MAVENCENTRAL_SONATYPE_SKIP_PUBLICATION_CHECK: true
        run: ./gradlew jreleaserDeploy -PreleaseVersion=${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            webrtc-audio-processing/build/libs/*.jar
            webrtc-audio-processing-natives/build/libs/*.jar

  bump-version:
    name: Bump to next SNAPSHOT
    needs: publish-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Extract version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump to next SNAPSHOT version
        env:
          TAG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          CURRENT=$(grep 'version = rootProject' build.gradle.kts | grep -oP '\d+\.\d+\.\d+-SNAPSHOT' || echo "")
          if [[ "$CURRENT" == *"SNAPSHOT"* ]]; then
            IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG_VERSION"
            NEXT_MINOR=$((MINOR + 1))
            NEXT_VERSION="${MAJOR}.${NEXT_MINOR}.0-SNAPSHOT"
            sed -i "s/${CURRENT}/${NEXT_VERSION}/" build.gradle.kts
            echo "Bumped version to: $NEXT_VERSION"
          else
            echo "Could not find SNAPSHOT version in build.gradle.kts, skipping"
            echo "SKIP_BUMP=true" >> "$GITHUB_ENV"
          fi

      - name: Commit and push version bump
        if: env.SKIP_BUMP != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build.gradle.kts
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "chore: bump version to next SNAPSHOT"
          git push origin main
