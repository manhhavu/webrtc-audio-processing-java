name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: macos-aarch64
            lib: libapm.dylib
          - os: ubuntu-latest
            target: linux-x86_64
            lib: libapm.so
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install meson ninja

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install rust-objcopy
        run: rustup component add llvm-tools

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Build native library
        working-directory: native
        run: cargo build --release

      - name: Build Java
        run: ./gradlew build -x test

      - name: Run tests
        env:
          APM_LIB_PATH: ${{ github.workspace }}/native/target/release
        run: ./gradlew test

      - name: Upload native artifact
        uses: actions/upload-artifact@v5
        with:
          name: native-${{ matrix.target }}
          path: native/target/release/${{ matrix.lib }}

  publish-snapshot:
    name: Publish SNAPSHOT
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Validate SNAPSHOT version
        run: |
          VERSION=$(./gradlew properties -q | grep "^version:" | awk '{print $2}')
          if [[ ! "$VERSION" == *"SNAPSHOT"* ]]; then
            echo "Error: Version $VERSION is not a SNAPSHOT version"
            exit 1
          fi
          echo "Publishing version: $VERSION"

      - name: Download macOS native
        uses: actions/download-artifact@v5
        with:
          name: native-macos-aarch64
          path: webrtc-audio-processing-natives/build/natives/macos-aarch64

      - name: Download Linux native
        uses: actions/download-artifact@v5
        with:
          name: native-linux-x86_64
          path: webrtc-audio-processing-natives/build/natives/linux-x86_64

      - name: Build
        run: ./gradlew build -x test

      - name: Publish to Maven Central Snapshots
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: ./gradlew publishMavenPublicationToSnapshotRepository
